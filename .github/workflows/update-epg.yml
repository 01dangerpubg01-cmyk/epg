name: EPG Auto Update

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Download EPG
        env:
          EPG_SOURCE_URL: ${{ secrets.EPG_SOURCE_URL }}
        run: python fetch_epg.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add epg.xml.gz

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "EPG Update"
            git push
          fi
