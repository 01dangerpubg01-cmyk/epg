name: EPG Auto Update

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download EPG
        env:
          EPG_SOURCE_URL: ${{ secrets.EPG_SOURCE_URL }}
        run: python fetch_epg.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add epg.xml epg.xml.gz

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "EPG Update"
          git push
